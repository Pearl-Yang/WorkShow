<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - Ginyo by Margerat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4db6ac;
            --primary-dark: #26a69a;
            --primary-light: #80cbc4;
            --secondary: #e0f2f1;
            --bg-main: #faf8f5;
            --bg-card: #ffffff;
            --bg-nav: rgba(250, 248, 245, 0.95);
            --text-primary: #3e2723;
            --text-secondary: #5d4037;
            --text-light: #8d6e63;
            --border: #e8e0d8;
            --shadow: rgba(62, 39, 35, 0.08);
            --accent: #26a69a;
            --warm-primary: #a1887f;
            --warm-light: #d7ccc8;
            --warm-bg: #efebe9;
            --cream: #f5f0eb;
            --gradient-warm: linear-gradient(135deg, #4db6ac 0%, #80cbc4 50%, #b2dfdb 100%);
            --gradient-cream: linear-gradient(135deg, #f5f0eb 0%, #efebe9 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== 导航栏 ========== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.25rem 3rem;
            background: var(--bg-nav);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-social {
            display: flex;
            gap: 1rem;
        }

        .nav-social a {
            color: var(--text-light);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-social a:hover {
            color: var(--primary);
        }

        /* ========== 详情页主体 ========== */
        .detail-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 8rem 2.5rem 4rem;
        }

        /* 返回按钮 */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .back-button:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* 作品封面区域 */
        .work-cover-wrapper {
            position: relative;
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .work-cover {
            position: relative;
            width: auto;
            max-width: 100%;
            max-height: 80vh;
            border-radius: 1.5rem;
            overflow: visible;
            box-shadow: 0 20px 60px rgba(212, 132, 124, 0.15);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .work-cover img,
        .work-cover canvas,
        .work-cover .work-cover-img {
            max-width: 100%;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 1.5rem;
        }

        .work-cover .cover-placeholder {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        /* 手绘标注样式 */
        .sketch-annotations {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .sketch-annotation {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
        }

        .annotation-point {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(212, 132, 124, 0.4);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .annotation-point:hover {
            transform: scale(1.2);
            background: var(--primary-dark);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(212, 132, 124, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(212, 132, 124, 0.6); }
        }

        /* 手绘箭头SVG */
        .sketch-arrow {
            position: absolute;
            width: 120px;
            height: 60px;
            overflow: visible;
        }

        .sketch-arrow path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawArrow 1s ease forwards;
        }

        .sketch-arrow circle {
            fill: var(--primary);
        }

        @keyframes drawArrow {
            to { stroke-dashoffset: 0; }
        }

        /* 标注气泡 */
        .annotation-bubble {
            position: absolute;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            width: 200px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 100;
            border: 2px solid var(--primary);
        }

        .annotation-bubble::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-left: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            transform: rotate(-45deg);
        }

        .annotation-bubble.left::before {
            right: -8px;
            top: 50%;
            margin-top: -6px;
            transform: rotate(-45deg);
        }

        .annotation-bubble.right::before {
            left: -8px;
            top: 50%;
            margin-top: -6px;
            transform: rotate(135deg);
        }

        .annotation-bubble.top::before {
            left: 50%;
            bottom: -8px;
            margin-left: -6px;
            transform: rotate(-135deg);
        }

        .annotation-bubble.bottom::before {
            left: 50%;
            top: -8px;
            margin-left: -6px;
            transform: rotate(45deg);
        }

        .sketch-annotation:hover .annotation-bubble,
        .sketch-annotation.active .annotation-bubble {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .annotation-bubble h5 {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
            font-family: 'Inter', sans-serif;
        }

        .annotation-bubble p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* 标注说明区域 */
        .annotation-legend {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid var(--border);
            width: 100%;
        }

        .annotation-legend-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .annotation-legend-title i {
            color: var(--primary);
        }

        .annotation-legend-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 0.75rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: background 0.3s;
            background: var(--bg-main);
        }

        .legend-item:hover {
            background: var(--bg-main);
        }

        .legend-number {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .legend-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 作品头部信息 */
        .work-header {
            margin-bottom: 3rem;
        }

        .work-tag {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: linear-gradient(135deg, rgba(212, 132, 124, 0.15), rgba(245, 208, 197, 0.15));
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .work-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .work-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .work-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .work-meta .github-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .work-meta .github-link:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* 作品描述 */
        .work-section {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--cream) 100%);
            border-radius: 1.5rem;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .work-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .work-section-title i {
            color: var(--primary);
        }

        .work-description {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.9;
        }

        /* 技术栈 */
        .tech-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .tech-item {
            padding: 0.6rem 1.2rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
        }

        .tech-item:hover {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(77, 182, 172, 0.08), rgba(161, 136, 127, 0.05));
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* 功能特点 */
        .feature-list {
            list-style: none;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .feature-item:last-child {
            border-bottom: none;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .feature-text {
            flex: 1;
        }

        .feature-text strong {
            display: block;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .feature-text span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 设计详情区域 */
        .design-section {
            margin-bottom: 2rem;
        }

        .design-section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .design-section-header h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .design-section-header i {
            color: var(--primary);
            font-size: 1rem;
        }

        .design-section-content {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.9;
            padding-left: 1.5rem;
        }

        /* 设计信息标签 */
        .design-info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 1.25rem 1.5rem;
            background: var(--bg-main);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .design-info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .design-info-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .design-info-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* 设计理念 */
        .design-concept {
            font-size: 1.1rem;
            color: var(--text-primary);
            line-height: 1.8;
            font-style: italic;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(77, 182, 172, 0.08), rgba(161, 136, 127, 0.08));
            border-radius: 1rem;
            border-left: 4px solid var(--primary);
            margin-bottom: 1.5rem;
        }

        /* 配色方案 */
        .color-palette {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .color-swatch {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch::after {
            content: attr(data-color);
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-light);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .color-swatch:hover::after {
            opacity: 1;
        }

        /* 关键词 */
        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .keyword-tag {
            padding: 0.5rem 1rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
        }

        .keyword-tag:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Web作品设计亮点 */
        .design-goals {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .design-goal-item {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
            transition: all 0.3s;
        }

        .design-goal-item:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .design-goal-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .design-goal-title i {
            font-size: 0.85rem;
        }

        .design-goal-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .design-highlights {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .design-highlight-item {
            background: var(--bg-main);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .design-highlight-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .design-highlight-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .design-highlight-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .design-highlight-content {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .project-results {
            background: linear-gradient(135deg, rgba(77, 182, 172, 0.08), rgba(161, 136, 127, 0.08));
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid var(--border);
        }

        .project-results h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-results h4 i {
            color: var(--primary);
        }

        .project-results ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .project-results li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-results li::before {
            content: '✓';
            color: var(--primary);
            font-weight: 700;
        }

        .project-gains {
            margin-top: 1.5rem;
        }

        .project-gains h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-gains h4 i {
            color: var(--primary);
        }

        .gains-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .gain-item {
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 0.75rem 1rem;
            background: var(--bg-main);
            border-radius: 0.5rem;
            border-left: 3px solid var(--primary);
        }

        /* 操作按钮 */
        .work-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 132, 124, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 其他作品推荐 */
        .more-works {
            margin-top: 4rem;
            padding-top: 3rem;
            border-top: 1px solid var(--border);
        }

        .more-works-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .more-works-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .more-work-card {
            background: var(--bg-card);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .more-work-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px var(--shadow);
        }

        .more-work-image {
            width: 100%;
            aspect-ratio: 16/10;
            overflow: hidden;
            position: relative;
        }

        .more-work-image canvas {
            width: 100%;

        // 绘制封面
        function drawCover(container, work) {
            if (work.image) {
                const img = document.createElement('img');
                img.src = work.image;
                img.alt = work.title;
                img.onerror = function() {
                    // 图片加载失败时显示占位
                    container.innerHTML = `<div class="cover-placeholder" style="background: linear-gradient(135deg, ${work.color}, ${adjustColor(work.color, -20)});">${work.title}</div>`;
                };
                container.appendChild(img);
            } else {
                drawPlaceholderCanvas(container, work);
            }
        }

        // 绘制占位封面
        function drawPlaceholderCanvas(container, work) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000;
            canvas.height = 562;
            drawPlaceholder(ctx, work, canvas.width, canvas.height);
            container.appendChild(canvas);
        }

        function drawPlaceholder(ctx, work, width, height) {
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, work.color);
            gradient.addColorStop(0.5, adjustColor(work.color, -10));
            gradient.addColorStop(1, '#d7ccc8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '600 48px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(work.title, width/2, height/2);
            
            ctx.font = '400 20px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText(work.tag, width/2, height/2 + 50);
            addWatermark(ctx, width, height);
        }

        function adjustColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
            return `rgb(${r},${g},${b})`;
        }

        function addWatermark(ctx, width, height) {
            ctx.font = WATERMARK_CONFIG.font;
            ctx.fillStyle = WATERMARK_CONFIG.color;
            const text = WATERMARK_CONFIG.text;
            const metrics = ctx.measureText(text);
            const tw = metrics.width;
            const th = 20;

            ctx.save();
            ctx.translate(width/2, height/2);
            ctx.rotate(WATERMARK_CONFIG.angle * Math.PI/180);
            ctx.translate(-width/2, -height/2);

            for (let y = -width; y < height + th*2; y += WATERMARK_CONFIG.spacingY) {
                for (let x = -width; x < width + tw; x += tw + WATERMARK_CONFIG.spacingX) {
                    ctx.fillText(text, x, y);
                }
            }
            ctx.restore();
        }

        }

        // 渲染手绘标注
        function renderAnnotations(work) {
            const container = document.getElementById('sketchAnnotations');
            container.innerHTML = '';

            if (!work.annotations || work.annotations.length === 0) return;

            work.annotations.forEach((ann, index) => {
                const annotation = document.createElement('div');
                annotation.className = 'sketch-annotation';
                annotation.style.left = `${ann.x}%`;
                annotation.style.top = `${ann.y}%`;
                annotation.style.animationDelay = `${index * 0.2}s`;

                // 气泡位置调整
                let bubbleClass = ann.position;
                let bubbleStyle = '';
                if (ann.position === 'left') {
                    bubbleStyle = 'right: 45px; top: 50%; transform: translateY(-50%);';
                } else if (ann.position === 'right') {
                    bubbleStyle = 'left: 45px; top: 50%; transform: translateY(-50%);';
                } else if (ann.position === 'top') {
                    bubbleStyle = 'bottom: 45px; left: 50%; transform: translateX(-50%);';
                } else {
                    bubbleStyle = 'top: 45px; left: 50%; transform: translateX(-50%);';
                }

                annotation.innerHTML = `
                    <div class="annotation-point">${ann.num}</div>
                    <div class="annotation-bubble ${bubbleClass}" style="${bubbleStyle}">
                        <h5>${ann.title}</h5>
                        <p>${ann.desc}</p>
                    </div>
                `;

                container.appendChild(annotation);
            });
        }

                        ${work.image 
                            ? `<img src="${work.image}" alt="${work.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                               <div class="more-work-fallback" style="background: linear-gradient(135deg, ${work.color}, ${adjustColor(work.color, -30)}); display: none;">
                                   <i class="fas fa-image"></i>
                               </div>`
                            : `<canvas width="320" height="200" data-work='${JSON.stringify(work).replace(/'/g, "&#39;")}'></canvas>`
                        }
                        <span class="more-work-tag">${work.tag}</span>
                    </div>
                    <div class="more-work-info">
                        <h4>${work.title}</h4>
                        <p>${work.description}</p>
                    </div>
                </div>
            `).join('');

            // 绘制 Canvas 封面
            document.querySelectorAll('.more-work-image canvas').forEach(canvas => {
                const work = JSON.parse(canvas.dataset.work);
                drawCover(canvas, work);
            });
        }

        // 轮播图控制
        let currentSlide = 0;
        let carouselData = [];

        function initCarousel(screenshots) {
            carouselData = screenshots;
            currentSlide = 0;
            renderCarouselSlides();
            renderCarouselDots();
            renderCarouselThumbnails();
            updateCarouselPosition();
        }

        function renderCarouselSlides() {
            const wrapper = document.getElementById('carouselWrapper');
            wrapper.innerHTML = carouselData.map((s, i) => {
                // 如果有真实图片路径，显示图片；否则显示渐变卡片
                if (s.src) {
                    return `
                        <div class="carousel-slide">
                            <img src="${s.src}" alt="${s.title}" class="carousel-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="carousel-screen-fallback" style="background: linear-gradient(135deg, #8a9a7c, #6a7a5c); display: none;">
                                <i class="fas fa-image"></i>
                                <span class="carousel-screen-title">${s.title}</span>
                            </div>
                        </div>
                    `;
                }
                return `
                    <div class="carousel-slide">
                        <div class="carousel-screen" style="background: linear-gradient(135deg, ${s.color}, ${adjustColor(s.color, -30)});">
                            <i class="fas ${s.icon}"></i>
                            <span class="carousel-screen-title">${s.title}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCarouselDots() {
            const container = document.getElementById('carouselDots');
            container.innerHTML = carouselData.map((_, i) => `
                <button class="carousel-dot ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="goToSlide(${i})"></button>
            `).join('');
        }

        function renderCarouselThumbnails() {
            const container = document.getElementById('carouselThumbnails');
            container.innerHTML = carouselData.map((s, i) => {
                // 如果有真实图片路径，显示缩略图；否则显示渐变卡片
                if (s.src) {
                    return `
                        <div class="carousel-thumbnail ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="goToSlide(${i})">
                            <img src="${s.src}" alt="${s.title}" class="carousel-thumbnail-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="carousel-thumbnail-fallback" style="display: none; align-items: center; justify-content: center;">
                                <i class="fas fa-image"></i>
                            </div>
                            <span class="carousel-thumbnail-title">${s.title}</span>
                        </div>
                    `;
                }
                return `
                    <div class="carousel-thumbnail ${i === 0 ? 'active' : ''}" style="background: ${adjustColor(s.color, -15)};" data-index="${i}" onclick="goToSlide(${i})">
                        <i class="fas ${s.icon}"></i>
                        <span class="carousel-thumbnail-title">${s.title}</span>
                    </div>
                `;
            }).join('');
        }

        function updateCarouselPosition() {
            const wrapper = document.getElementById('carouselWrapper');
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;

            // 更新dots
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });

            // 更新缩略图
            document.querySelectorAll('.carousel-thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === currentSlide);
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarouselPosition();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % carouselData.length;
            updateCarouselPosition();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + carouselData.length) % carouselData.length;
            updateCarouselPosition();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const workId = getUrlParam('id');
            
            if (!workId) {
                showNotice('未指定作品');
                setTimeout(() => location.href = 'index.html#works', 1500);
                return;
            }

            const work = getWorkById(workId);
            
            if (!work) {
                showNotice('作品不存在');
                setTimeout(() => location.href = 'index.html#works', 1500);
                return;
            }

            // 隐藏加载状态，显示内容
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('detailContent').style.display = 'block';
            document.getElementById('pageFooter').style.display = 'flex';

            // 渲染详情
            renderWorkDetail(work);

            // 绑定轮播图导航按钮
            document.getElementById('carouselPrev').addEventListener('click', prevSlide);
            document.getElementById('carouselNext').addEventListener('click', nextSlide);

            // 键盘导航
            document.addEventListener('keydown', (e) => {
                if (carouselData.length > 0) {
                    if (e.key === 'ArrowLeft') prevSlide();
                    if (e.key === 'ArrowRight') nextSlide();
                }
            });

            // 更新页面标题
            document.title = `${work.title} - Ginyo by Margerat`;
        });
    </script>
</body>
</html>
